<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Permission Management</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* FLASH */
        .flash {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .flash-success {
            background: #16a34a;
        }

        .flash-error {
            background: #dc2626;
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        .admin-item:last-child {
            border-bottom: none;
        }

        .admin-name {
            font-size: 16px;
        }

        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .add-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            margin-right: 10px;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-add {
            background: #2563eb;
            color: white;
        }

        .btn-add:hover {
            background: #1d4ed8;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
        }

        .btn-main {
            background: #475569;
            color: white;
        }

        .btn-main:hover {
            background: #334155;
        }

        .btn-admin {
            background: #16a34a;
            color: white;
        }

        .btn-admin:hover {
            background: #15803d;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Permission Management</h1>

    <div class="card">

        <!-- FLASH -->
        {% if flash %}
            <div class="flash {% if 'Fail' in flash %}flash-error{% else %}flash-success{% endif %}">
                {{ flash }}
            </div>
        {% endif %}

        <!-- Admin list (пример, потом подставишь из backend) -->
        {% if admins %}
            {% for admin in admins %}
                <div class="admin-item">
                    <div class="admin-name">{{ admin.user_id }}</div>
                    <button class="btn btn-delete">Remove</button>
                </div>
            {% endfor %}
        {% else %}
            <div class="admin-item">
                <div class="admin-name">No admins found</div>
            </div>
        {% endif %}

        <!-- Add new admin -->
        <div class="add-section">
            <form method="post" action="/admin/permission-menu/">
                <input
                    type="text"
                    name="new_admin_id"
                    placeholder="Enter admin ID"
                    required
                >
                <button type="submit" class="btn btn-add">Add Admin</button>
            </form>
        </div>

        <!-- Navigation -->
        <div class="nav-buttons">
            <a href="/main_menu" class="btn-nav btn-main">Main Menu</a>
            <a href="/admin/" class="btn-nav btn-admin">Admin Panel</a>
        </div>

    </div>
</div>

</body>
</html>
